<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartCini | Akıllı Kampanya Asistanı</title>
    
    <!-- Dış Kaynaklar: Tasarım için Tailwind CSS, ikonlar için FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Mesaj penceresinin yüksekliğini ekran boyuna göre ayarlar */
        .chat-container { height: calc(100vh - 250px); }
        
        /* KartCini temasına özel gradyan arka plan */
        .bg-gradient-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* Banka filtreleme butonlarının (Pill) genel ve seçili halleri */
        .bank-pill { 
            cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; 
            padding-top: 4px !important; padding-bottom: 4px !important;
            font-size: 11px !important; flex-shrink: 0;
        }
        .bank-pill.active { 
            background-color: #7c3aed; color: white; border-color: #7c3aed; 
            box-shadow: 0 2px 4px rgba(124, 58, 237, 0.3); 
        }
        
        /* Yatay kaydırma çubuğunu gizleyen yardımcı sınıf */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }

        /* Yazıyor... (Typing) animasyonu için noktaların yanıp sönme efekti */
        .typing-dots span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background-color: #4B5563;
            display: inline-block; border-radius: 50%; margin: 0 1px;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }

        /* Gemini'den gelen HTML tablolarının şık ve çizgili görünmesi için CSS kuralları */
        #chatWindow table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85rem; background: white; }
        #chatWindow th, #chatWindow td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
        #chatWindow th { background-color: #f8fafc; font-weight: bold; color: #475569; }
        #chatWindow tr:nth-child(even) { background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <!-- Üst Başlık ve Logo Alanı -->
    <nav class="bg-gradient-custom p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="kartcini.svg" alt="KartCini Logo" class="w-10 h-10">
                <h1 class="text-2xl font-bold italic">KartCini</h1>
            </div>
            <span class="text-sm opacity-80 italic">Akıllı Kampanya Rehberiniz v1.0014</span>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-4xl">
        <!-- Mesajlaşma Alanı -->
        <div id="chatWindow" class="chat-container bg-white rounded-lg shadow-xl overflow-y-auto p-4 mb-4 space-y-4">
            <div class="flex items-start">
                <div class="bg-purple-100 text-purple-800 p-3 rounded-lg max-w-[80%] shadow-sm text-sm">
                    Hoş geldin! Ben KartCini. Bugün hangi harcaman için en iyi kampanyayı bulmamı istersin? (Örn: Market, Akaryakıt, Giyim...)
                </div>
            </div>
        </div>

        <!-- Giriş ve Kontrol Paneli -->
        <div class="bg-white rounded-lg shadow-lg p-4 relative">
            
            <!-- Banka Filtreleri: Yatayda kaydırılabilir yapı -->
            <div class="mb-3">
                <div id="bankFilters" class="flex overflow-x-auto py-1 gap-2 no-scrollbar whitespace-nowrap px-1 border-b border-gray-50 pb-2">
                    <button type="button" id="allBanksBtn" onclick="toggleAllBanks(this)" class="bank-pill px-4 py-1 rounded-full font-bold text-gray-600 border-purple-400">HEPSİ</button>
                    <!-- Banka butonları: Parametreler backend'deki 'issuer' isimleriyle eşleşmeli -->
                    <button type="button" onclick="toggleBank(this, 'bonus')" class="bank-pill px-4 py-1 rounded-full text-gray-600">Bonus</button>
                    <button type="button" onclick="toggleBank(this, 'axess')" class="bank-pill px-4 py-1 rounded-full text-gray-600">Axess</button>
                    <button type="button" onclick="toggleBank(this, 'world')" class="bank-pill px-4 py-1 rounded-full text-gray-600">World</button>
                    <button type="button" onclick="toggleBank(this, 'teb')" class="bank-pill px-4 py-1 rounded-full text-gray-600">Teb Bonus</button>
                    <button type="button" onclick="toggleBank(this, 'deniz')" class="bank-pill px-4 py-1 rounded-full text-gray-600">DenizBank</button>
                    <button type="button" onclick="toggleBank(this, 'hadi')" class="bank-pill px-4 py-1 rounded-full text-gray-600">Hadi</button>
                    <button type="button" onclick="toggleBank(this, 'on')" class="bank-pill px-4 py-1 rounded-full text-gray-600">ON</button>
                    <button type="button" onclick="toggleBank(this, 'qnb')" class="bank-pill px-4 py-1 rounded-full text-gray-600">QNB First</button>
                    <button type="button" onclick="toggleBank(this, 'vakif')" class="bank-pill px-4 py-1 rounded-full text-gray-600">Vakıf World</button>
                </div>
            </div>

            <!-- Sorgu Giriş Formu -->
            <form id="searchForm" class="flex space-x-2">
                <input type="text" id="userQuery" placeholder="Hangi kampanyayı arıyorsunuz?" 
                       class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner text-sm" 
                       required autocomplete="off">
                <button type="submit" id="sendBtn" class="bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-full transition duration-300 disabled:bg-gray-400">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <!-- Hızlı Öneri Etiketleri -->
            <div class="mt-2 flex space-x-2 text-xs text-gray-500">
                <span>Popüler:</span>
                <button onclick="quickSearch('Market')" class="hover:text-purple-600 underline">Market</button>
                <button onclick="quickSearch('Benzin')" class="hover:text-purple-600 underline">Benzin</button>
                <button onclick="quickSearch('Online Alışveriş')" class="hover:text-purple-600 underline">Online</button>
            </div>

            <!-- Model Seçim Kutusu -->
            <select id="modelSelect" onchange="saveModelChoice()" class="ml-2 bg-gray-50 border border-purple-200 text-gray-700 text-[10px] rounded-lg focus:ring-purple-500 focus:border-purple-500 p-1">
                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Hızlı&Öfkeli)</option>
                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (2.5 olmazsa)</option>
                <option value="gemma-4-26b-a4b-it">Gemma 4 26B (Yavaş&Sabırlı)</option>
                <option value="my-agent">🚀 Kendi Ajanım</option>
            </select>
            <a href="https://kreosus.com/kartcinicom" target="_blank" 
               class="inline-flex items-center bg-white border border-orange-300 text-orange-600 px-3 py-1 rounded-full text-[10px] font-bold hover:bg-orange-50 transition ml-auto">
                <i class="fas fa-heart mr-1"></i> Kahve Ismarla
            </a>
            <!-- Hata Mesajı ve Tekrar Dene Butonu -->
            <div id="retryContainer" class="hidden mt-2 p-2 bg-red-50 border border-red-200 rounded flex items-center justify-between">
                <span class="text-red-600 text-sm italic"><i class="fas fa-exclamation-triangle mr-2"></i>Bir sorun oluştu.</span>
                <button onclick="retryLastSearch()" class="text-red-700 font-bold text-sm underline"><i class="fas fa-redo-alt mr-1"></i> Tekrar Dene</button>
            </div>
        </div>
        
        <!-- Kaynak Kampanyalar: RAG sisteminden dönen ham verilerin dikey/grid listesi -->
        <div id="campaignList" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <!-- JavaScript tarafından doldurulur -->
        </div>
    </div>

    <script>
        // API Adresi (Kendi Render URL'inle güncellediğinden emin ol)
        const API_URL = "https://kartcini-api.onrender.com/search";
        
        // Uygulama Durum Yönetimi (State)
        let chatHistory = [];      // Sohbet geçmişini (RAG hafızası) saklar
        let selectedBanks = [];    // Seçili banka ID'lerini saklar
        let lastSentQuery = "";    // Hata durumunda tekrar denemek için son soruyu saklar
        let countdownInterval = null;

        // DOM Elementleri
        const chatWindow = document.getElementById('chatWindow');
        const searchForm = document.getElementById('searchForm');
        const userQuery = document.getElementById('userQuery');
        const retryContainer = document.getElementById('retryContainer');
        const sendBtn = document.getElementById('sendBtn');
        const campaignList = document.getElementById('campaignList');

        /**
         * Tekli banka butonu tıklama yönetimi
         */
        function toggleBank(element, bankName) {
            element.classList.toggle('active');
            if (element.classList.contains('active')) {
                if (!selectedBanks.includes(bankName)) selectedBanks.push(bankName);
            } else {
                selectedBanks = selectedBanks.filter(b => b !== bankName);
            }
            checkAllBanksStatus(); // HEPSİ butonunun durumunu güncelle
            saveToStorage();       // Tarayıcı hafızasına kaydet
        }

        /**
         * HEPSİ butonuna basıldığında tüm bankaları seçer veya kaldırır
         */
        function toggleAllBanks(allBtn) {
            const isActive = allBtn.classList.toggle('active');
            const otherPills = document.querySelectorAll('.bank-pill:not(#allBanksBtn)');
            
            selectedBanks = []; 
            otherPills.forEach(pill => {
                const match = pill.getAttribute('onclick').match(/'([^']+)'/);
                if (match) {
                    const bankName = match[1];
                    if (isActive) {
                        pill.classList.add('active');
                        selectedBanks.push(bankName);
                    } else {
                        pill.classList.remove('active');
                    }
                }
            });
            saveToStorage();
        }

        /**
         * Bankalar manuel tek tek seçildiğinde HEPSİ butonunu otomatik yakar/söndürür
         */
        function checkAllBanksStatus() {
            const allBtn = document.getElementById('allBanksBtn');
            const totalBanks = document.querySelectorAll('.bank-pill:not(#allBanksBtn)').length;
            if (selectedBanks.length === totalBanks && totalBanks > 0) {
                allBtn.classList.add('active');
            } else {
                allBtn.classList.remove('active');
            }
        }

        /**
         * Banka tercihlerini tarayıcı kapansa da hatırlamak için kaydeder
         */
        function saveToStorage() {
            localStorage.setItem('kartcini_banks', JSON.stringify(selectedBanks));
        }

        /**
         * Sayfa açıldığında tarayıcı hafızasındaki bankaları yükler
         */
        function loadSavedBanks() {
            const saved = localStorage.getItem('kartcini_banks');
            const allBtn = document.getElementById('allBanksBtn');
            const otherPills = document.querySelectorAll('.bank-pill:not(#allBanksBtn)');
    
            if (saved) {
                selectedBanks = JSON.parse(saved);
                otherPills.forEach(pill => {
                    const match = pill.getAttribute('onclick').match(/'([^']+)'/);
                    if (match) {
                        const bankId = match[1];
                        if (selectedBanks.includes(bankId)) pill.classList.add('active');
                    }
                });
                checkAllBanksStatus();
            } else {
                // Eğer hafıza boşsa (ilk ziyaret), HEPSİ tıkla
                if (allBtn) toggleAllBanks(allBtn); 
            }
        }
        
        window.onload = () => {
            loadSavedBanks(); // issuer seçimini hatırla

            // model seçimini hatırla
            const savedModel = localStorage.getItem('kartcini_selected_model');
            if (savedModel) {
                document.getElementById('modelSelect').value = savedModel;
            }
        };

        // Model seçimini kaydet:
        function saveModelChoice() {
            const model = document.getElementById('modelSelect').value;
            localStorage.setItem('kartcini_selected_model', model);
        }

        /**
         * Ekrana mesaj balonu ekler (Kullanıcı veya Bot için)
         */
        function addMessage(text, isUser = false, isTyping = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex items-end justify-end" : "flex items-start";
            const content = document.createElement('div');
            
            // max-w-full ve overflow-x-auto sayesinde gelen tablolar düzgün görünür
            content.className = isUser 
                ? "bg-purple-600 text-white p-3 rounded-lg max-w-[90%] shadow-md text-sm" 
                : "bg-white text-gray-800 p-3 rounded-lg max-w-full shadow-md border border-gray-200 overflow-x-auto text-sm";
        
            if (isTyping) {
                content.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
                div.id = "typingIndicator";
            } else {
                content.innerHTML = text; // Gemini'den gelen HTML/Tablo verisini render et
            }
            div.appendChild(content);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Yeni mesajda aşağı kaydır
        }

        /**
         * Öneri etiketlerine tıklandığında otomatik arama yapar
         */
        function quickSearch(tag) {
            userQuery.value = tag;
            searchForm.dispatchEvent(new Event('submit'));
        }

        /**
         * Hata sonrası son sorguyu tekrar gönderir
         */
        function retryLastSearch() {
            if (lastSentQuery) {
                retryContainer.classList.add('hidden');
                performSearch(lastSentQuery);
            }
        }

        /**
         * Gemini cevabının altındaki ham kampanya kartlarını oluşturur
         */
        function showCampaignCards(campaigns) {
            if(campaigns && campaigns.length > 0) {
                campaignList.innerHTML = "";
                campaignList.classList.remove('hidden');
                campaigns.forEach(c => {
                    const card = `
                        <div class="bg-white p-3 rounded shadow border-l-4 border-purple-500 text-xs">
                            <h4 class="font-bold text-gray-700 truncate">${c.summary || 'Kampanya'}</h4>
                            <a href="${c.url}" target="_blank" class="text-blue-500 underline block mt-2 italic font-bold">Kampanyaya Git →</a>
                        </div>`;
                    campaignList.insertAdjacentHTML('beforeend', card);
                });
            } 
            // Eğer kampanya yoksa, mevcut listeyi korur (siler veya gizlemez)
        }
        
        /**
         * Form gönderimini yakalar
         */
        searchForm.onsubmit = async (e) => {
            e.preventDefault();
            const query = userQuery.value.trim();
            if(!query) return;
            retryContainer.classList.add('hidden');
            lastSentQuery = query; // Sorguyu yedekle
            addMessage(query, true);
            userQuery.value = "";
            await performSearch(query);
        };

        /**
         * Backend API ile iletişimi kuran ana asenkron fonksiyon
         */
        async function performSearch(query) {
            sendBtn.disabled = true;
            addMessage("", false, true); // Üç nokta (typing) göster
        
            // --- ZAMAN AŞIMI AYARI ---
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 300000); // 300.000 ms = 300 saniye = 5 dk
        
            const modelSelect = document.getElementById('modelSelect');
            const selectedModel = modelSelect.value; 
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal, // Controller'ı fetch'e bağlıyoruz
                    body: JSON.stringify({ 
                        query: query,
                        history: chatHistory,
                        selected_banks: selectedBanks.length > 0 ? selectedBanks : null,
                        model_name: selectedModel // model seçimi
                    })
                });
        
                // İstek başarılı olduysa zamanlayıcıyı temizle
                clearTimeout(timeoutId);
        
                const data = await response.json();
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove(); // Typing bitti
        
                if (!response.ok) {
                    // API taraflı hata yönetimi (Kota 429 vb.)
                    const errorMsg = data.message || "Sunucu şu an yanıt veremiyor.";
                    const retrySeconds = data.retry_after;
                    addMessage(`<i class="fas fa-exclamation-circle mr-2 text-red-500"></i>${errorMsg}`);
                    if (retrySeconds) startRetryCountdown(Math.ceil(retrySeconds));
                    else retryContainer.classList.remove('hidden');
                    return;
                }

                // Başarılı yanıt: Hafızayı güncelle ve placeholder değiştir
                // --- KENDİ AJANIM MODU ÖZEL UI ---
                if (selectedModel === "my-agent") {
                    addMessage("✨ Kampanya verilerini senin için hazırladım! Aşağıdaki butonu kullanarak verileri indirebilir ve kendi yapay zeka asistanınıza yükleyebilirsiniz. Yeni bir arama yapmak için lütfen sayfayı yenileyin!");
                    
                    // İndir butonu ekle
                    showDownloadButton(data.llm_answer);

                    // Ajan modunda tek seferlik veri çekimi daha güvenlidir:
                    userQuery.disabled = true;
                    sendBtn.classList.add('hidden');
                } else {
                    // Normal Bot Cevabı
                    addMessage(data.llm_answer);
                }
                chatHistory = data.history;
        
                // Placeholder güncelleme
                if (chatHistory.length > 0) {
                    modelSelect.disabled = true; // Seçimi etkisiz hale getir
                    modelSelect.classList.add('opacity-50', 'cursor-not-allowed'); // Görsel olarak belirt
                    
                    if (selectedModel === "my-agent")
                        // Bu modda placeholder'ı "Yeni arama için sayfayı yenile" yapıyoruz:
                        userQuery.placeholder = "Yeni bir ajan seçimi için sayfayı yenileyin.";
                    else
                        userQuery.placeholder = "Bu kampanyalarla ilgili başka ne öğrenmek istersiniz?";
                }
                
                document.getElementById('retryContainer').classList.add('hidden');
                if(data.retrieved_campaigns) showCampaignCards(data.retrieved_campaigns);
        
            } catch (error) {
                // ZAMAN AŞIMI HATASI KONTROLÜ
                if (error.name === 'AbortError') {
                    addMessage("<i class='fas fa-clock mr-2 text-orange-500'></i> Yanıt süresi çok uzadı. Gemma şu an yoğun olabilir, lütfen tekrar deneyin.");
                } else {
                    addMessage("<i class='fas fa-wifi mr-2 text-red-500'></i> Bağlantı hatası! Lütfen internetinizi kontrol edin.");
                }
                
                if (document.getElementById('typingIndicator')) document.getElementById('typingIndicator').remove();
                retryContainer.classList.remove('hidden');
                console.error("Fetch Error:", error);
            } finally {
                sendBtn.disabled = false;
                clearTimeout(timeoutId); // Her durumda temizle
            }
        }

        /**
         * İndir butonu - Kampanya verilerini dosya olarak indir
         */
        function showDownloadButton(textToDownload) {
            const div = document.createElement('div');
            div.className = "flex justify-center my-4";
            
            const downloadBtn = document.createElement('button');
            downloadBtn.type = 'button';
            downloadBtn.className = "bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow-lg flex items-center transition transform hover:scale-105";
            downloadBtn.innerHTML = `<i class="fas fa-download mr-2"></i> Verileri İndir`;
            
            downloadBtn.addEventListener('click', () => {
                const element = document.createElement('a');
                const file = new Blob([textToDownload], {type: 'text/plain;charset=utf-8'});
                element.href = URL.createObjectURL(file);
                element.download = `kampanya-verileri-${new Date().getTime()}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                URL.revokeObjectURL(element.href);
            });
            
            div.appendChild(downloadBtn);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        /**
         * Kota aşımı hatasında butonu kilitler ve saniyeyi geri saydırır
         */
        function startRetryCountdown(seconds) {
            const retryBtn = retryContainer.querySelector('button');
            retryContainer.classList.remove('hidden');
            retryBtn.disabled = true;
            retryBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            let timeLeft = seconds;
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    retryBtn.innerHTML = `<i class="fas fa-redo-alt mr-1"></i> Şimdi Tekrar Dene`;
                    retryBtn.disabled = false;
                    retryBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    sendBtn.disabled = false;
                } else {
                    sendBtn.disabled = false;
                    retryBtn.innerHTML = `<i class="fas fa-hourglass-half mr-1"></i> ${timeLeft}s Bekleyin...`;
                    timeLeft--;
                }
            }, 1000);
        }
    </script>
</body>
</html>
