    <script>
        
        // Uygulama Durum Yönetimi (State)
        let chatHistory = [];      // Sohbet geçmişini (RAG hafızası) saklar
        let selectedBanks = [];    // Seçili banka ID'lerini saklar
        let lastSentQuery = "";    // Hata durumunda tekrar denemek için son soruyu saklar
        let countdownInterval = null;

        // DOM Elementleri
        const chatWindow = document.getElementById('chatWindow');
        const searchForm = document.getElementById('searchForm');
        const userQuery = document.getElementById('userQuery');
        const retryContainer = document.getElementById('retryContainer');
        const sendBtn = document.getElementById('sendBtn');
        const campaignList = document.getElementById('campaignList');

        /**
         * Tekli banka butonu tıklama yönetimi
         */
        function toggleBank(element, bankName) {
            element.classList.toggle('active');
            if (element.classList.contains('active')) {
                if (!selectedBanks.includes(bankName)) selectedBanks.push(bankName);
            } else {
                selectedBanks = selectedBanks.filter(b => b !== bankName);
            }
            checkAllBanksStatus(); // HEPSİ butonunun durumunu güncelle
            saveToStorage();       // Tarayıcı hafızasına kaydet
        }

        /**
         * HEPSİ butonuna basıldığında tüm bankaları seçer veya kaldırır
         */
        function toggleAllBanks(allBtn) {
            const isActive = allBtn.classList.toggle('active');
            const otherPills = document.querySelectorAll('.bank-pill:not(#allBanksBtn)');
            
            selectedBanks = []; 
            otherPills.forEach(pill => {
                const match = pill.getAttribute('onclick').match(/'([^']+)'/);
                if (match) {
                    const bankName = match[1];
                    if (isActive) {
                        pill.classList.add('active');
                        selectedBanks.push(bankName);
                    } else {
                        pill.classList.remove('active');
                    }
                }
            });
            saveToStorage();
        }

        /**
         * Bankalar manuel tek tek seçildiğinde HEPSİ butonunu otomatik yakar/söndürür
         */
        function checkAllBanksStatus() {
            const allBtn = document.getElementById('allBanksBtn');
            const totalBanks = document.querySelectorAll('.bank-pill:not(#allBanksBtn)').length;
            if (selectedBanks.length === totalBanks && totalBanks > 0) {
                allBtn.classList.add('active');
            } else {
                allBtn.classList.remove('active');
            }
        }

        /**
         * Banka tercihlerini tarayıcı kapansa da hatırlamak için kaydeder
         */
        function saveToStorage() {
            localStorage.setItem('kartcini_banks', JSON.stringify(selectedBanks));
        }

        /**
         * Sayfa açıldığında tarayıcı hafızasındaki bankaları yükler
         */
        function loadSavedBanks() {
            const saved = localStorage.getItem('kartcini_banks');
            const allBtn = document.getElementById('allBanksBtn');
            const otherPills = document.querySelectorAll('.bank-pill:not(#allBanksBtn)');
    
            if (saved) {
                selectedBanks = JSON.parse(saved);
                otherPills.forEach(pill => {
                    const match = pill.getAttribute('onclick').match(/'([^']+)'/);
                    if (match) {
                        const bankId = match[1];
                        if (selectedBanks.includes(bankId)) pill.classList.add('active');
                    }
                });
                checkAllBanksStatus();
            } else {
                // Eğer hafıza boşsa (ilk ziyaret), HEPSİ tıkla
                if (allBtn) toggleAllBanks(allBtn); 
            }
        }
        
        window.onload = () => {
            loadSavedBanks(); // issuer seçimini hatırla

            // Sadece oturum varsa eski seçimi hatırla, yoksa 'my-agent' kalmaya zorla
            _supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    const savedModel = localStorage.getItem('kartcini_selected_model');
                    if (savedModel) {
                        document.getElementById('modelSelect').value = savedModel;
                    }
                } else {
                    document.getElementById('modelSelect').value = "my-agent";
                }
            });
        };

        // Model seçimini kaydet:
        function saveModelChoice() {
            const model = document.getElementById('modelSelect').value;
            localStorage.setItem('kartcini_selected_model', model);
        }

        /**
         * Ekrana mesaj balonu ekler (Kullanıcı veya Bot için)
         */
        function addMessage(text, isUser = false, isTyping = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex items-end justify-end" : "flex items-start";
            const content = document.createElement('div');
            
            // max-w-full ve overflow-x-auto sayesinde gelen tablolar düzgün görünür
            content.className = isUser 
                ? "bg-purple-600 text-white p-3 rounded-lg max-w-[90%] shadow-md text-sm" 
                : "bg-white text-gray-800 p-3 rounded-lg max-w-full shadow-md border border-gray-200 overflow-x-auto text-sm";
        
            if (isTyping) {
                content.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
                div.id = "typingIndicator";
            } else {
                content.innerHTML = text; // Gemini'den gelen HTML/Tablo verisini render et
            }
            div.appendChild(content);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Yeni mesajda aşağı kaydır
        }

        /**
         * Öneri etiketlerine tıklandığında otomatik arama yapar
         */
        function quickSearch(tag) {
            userQuery.value = tag;
            searchForm.dispatchEvent(new Event('submit'));
        }

        /**
         * Hata sonrası son sorguyu tekrar gönderir
         */
        function retryLastSearch() {
            if (lastSentQuery) {
                retryContainer.classList.add('hidden');
                performSearch(lastSentQuery);
            }
        }

        /**
         * Gemini cevabının altındaki ham kampanya kartlarını oluşturur
         */
        function showCampaignCards(campaigns) {
            if(campaigns && campaigns.length > 0) {
                campaignList.innerHTML = "";
                campaignList.classList.remove('hidden');
                campaigns.forEach(c => {
                    const card = `
                        <div class="bg-white p-3 rounded shadow border-l-4 border-purple-500 text-xs flex gap-3 items-center">

                            <!-- Kampanya İçeriği -->
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-gray-700 truncate">${c.summary || 'Kampanya'}</h4>
                                <a href="${c.url}" target="_blank" class="text-blue-500 underline block mt-2 italic font-bold">Kampanyaya Git →</a>
                            </div>
                        </div>`;
                    campaignList.insertAdjacentHTML('beforeend', card);
                });
            } 
            // Eğer kampanya yoksa, mevcut listeyi korur (siler veya gizlemez)
        }
        
        /**
         * Form gönderimini yakalar
         */
        searchForm.onsubmit = async (e) => {
            e.preventDefault();
            const query = userQuery.value.trim();
            if(!query) return;
            retryContainer.classList.add('hidden');
            lastSentQuery = query; // Sorguyu yedekle
            addMessage(query, true);
            userQuery.value = "";
            await performSearch(query);
        };

        const _supabase = supabase.createClient('https://jnphjmycmimgpdnctabe.supabase.co', 'sb_publishable_QNjdf_CpgMbpMwumVn7tiQ__l-IWZD3');
        let sessionToken = null;
        let currentUserId = null;
        
        // Oturum kontrolü
        _supabase.auth.onAuthStateChange(async (event, session) => {
            const modelSelect = document.getElementById('modelSelect');
            
            if (session) {
                // --- YENİ: KAYIT MI GİRİŞ Mİ TESPİT ET ---
                const createdAt = new Date(session.user.created_at).getTime();
                const lastSignIn = new Date(session.user.last_sign_in_at).getTime();
                
                // Eğer yaratılma ve son giriş zamanı arasındaki fark 10 saniyeden azsa: Yeni Kayıt
                // (OAuth yönlendirmeleri arasındaki milisaniyelik farkları kompanse etmek için 10sn pay bırakıyoruz)
                const isNewUser = Math.abs(lastSignIn - createdAt) < 10000;
        
                if (isNewUser) {
                    // STANDART EVENT: sign_up
                    gtag('event', 'sign_up', { 
                        'method': 'Google',
                        'user_id': session.user.id 
                    });
                    console.log("🎉 Yeni kullanıcı kayıt oldu!");
                } else {
                    // STANDART EVENT: login
                    gtag('event', 'login', { 
                        'method': 'Google',
                        'user_id': session.user.id 
                    });
                }
                
                sessionToken = session.access_token;
                currentUserId = session.user.id; // ID'yi kaydet
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                updateQuotaDisplay(session.user.id);

                // Eğer şu an 'Kendi Ajanım' seçiliyse, otomatik olarak Gemini'ye geçiş yap
                if (modelSelect.value === "my-agent")
                    modelSelect.value = "gemini-2.5-flash";
            
            } else {
                sessionToken = null;
                currentUserId = null;
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
                    
                // Giriş yapılmamışsa varsayılan olarak 'Kendi Ajanım' moduna geri dön
                modelSelect.value = "my-agent";
            }
        });
        
        // Google ile Giriş Fonksiyonu
        async function loginWithGoogle() {
            await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    // login sonrası gidilecek adres:
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
        }

        async function updateQuotaDisplay(userId) {
            // test şemasından kotayı çek
            const { data } = await _supabase.schema(SUPABASE_SCHEMA).from('Profile').select('*').eq('id', userId).single();
            if (data) {
                document.getElementById('usageBadge').innerText = `${data.usage_count} / ${data.max_limit} Hak`;
            }
        }
        
        async function logout() {
            await _supabase.auth.signOut();
            location.reload();
        }
        
        /**
         * Backend API ile iletişimi kuran ana asenkron fonksiyon
         */
        async function performSearch(query) {
            const modelSelect = document.getElementById('modelSelect');
            const selectedModel = modelSelect.value;

            const startTime = performance.now(); 
            
            trackEvent('search', { 'search_term': query });
            
            // Eğer Gemini seçiliyse ama giriş yapılmamışsa uyar
            if (selectedModel !== "my-agent" && !sessionToken) {
                addMessage("💬 Giriş yapmadan sadece 'Kendi Ajanını' kullanabilirsin. Sağ üstten giriş yaparak ücretsiz günlük limitin dahilinde isteğin modeli kullanabilirsin.");
                return;
            }
            
            sendBtn.disabled = true;
            addMessage("", false, true); // Üç nokta (typing) göster
        
            // --- ZAMAN AŞIMI AYARI ---
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 300000); // 300.000 ms = 300 saniye = 5 dk
        
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        // Eğer sessionToken yoksa Authorization header'ını hiç ekleme veya boş bırak
                        'Authorization': sessionToken ? `Bearer ${sessionToken}` : "" 
                    },
                    signal: controller.signal, // Controller'ı fetch'e bağlıyoruz
                    body: JSON.stringify({ 
                        query: query,
                        history: chatHistory,
                        selected_banks: selectedBanks.length > 0 ? selectedBanks : null,
                        model_name: selectedModel // model seçimi
                    })
                });
        
                // İstek başarılı olduysa zamanlayıcıyı temizle
                clearTimeout(timeoutId);
        
                const data = await response.json();

                // --- ÖLÇÜM BİTİŞİ VE HESAPLAMA ---
                const endTime = performance.now();
                const durationSec = parseFloat(((endTime - startTime) / 1000).toFixed(2)); // Saniyeye çevir
        
                // Google Analytics'e Gönder
                trackEvent('search_performance', { 
                    'wait_time': durationSec, 
                    'status_code': response.status,
                    'description': response.ok ? null : data.detail || data.message
                });
        
                // Loglarda da görelim (Debug için)
                console.log(`⏱️ API Yanıt Süresi: ${durationSec} saniye [Model: ${selectedModel}]`);
                
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove(); // Typing bitti
        
                if (!response.ok) {
                    
                    // --- BACKEND'DEN GELEN MESAJI OKU ---
                    // detail (standard FastAPI) veya message (bizim custom)
                    let serverError = data.detail || data.message || "KartCini şu an cevap veremiyor.";
                    let bubbleContent = `⚠️ <b>Hata:</b> ${serverError}`;
        
                    // --- DURUM KODUNA GÖRE EKLEME YAP ---
                    
                    // 1. KOTA DOLDU (403)
                    if (response.status === 403) {
                        bubbleContent = `🚫 ${serverError}
                            <div class="mt-3 pt-2 border-t border-purple-200">
                                <p class="text-[10px] mb-2 italic text-gray-500">Geliştirici limitleri artırmama yardımcı ol:</p>
                                <a href="https://kreosus.com/kartcinicom" target="_blank"  onclick="trackCoffeeClick('error_bubble')" class="inline-block bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-sm hover:bg-orange-600 transition">
                                    <i class="fas fa-coffee mr-1"></i> Kahve Ismarla
                                </a>
                            </div>`;
                    } 
                    
                    // 2. KOTA AŞIMI / RATE LIMIT (429)
                    else if (response.status === 429) {
                        bubbleContent = `⏳ ${serverError}`;
                        if (data.retry_after) {
                            startRetryCountdown(Math.ceil(data.retry_after));
                        }
                    }
                    
                    // Mesajı balon olarak bas
                    addMessage(bubbleContent);
                    return;
                }

                // Başarılı yanıt: Hafızayı güncelle ve placeholder değiştir

                // kotayı hemen güncelle:
                if (currentUserId) {
                    updateQuotaDisplay(currentUserId);
                }
                
                // --- KENDİ AJANIM MODU ÖZEL UI ---
                if (selectedModel === "my-agent") {
                    addMessage("✨ Kampanya verilerini senin için hazırladım! Aşağıdaki butonu kullanarak verileri indirebilir ve kendi yapay zeka asistanınıza yükleyebilirsiniz. Yeni bir arama yapmak için sayfayı yenileyin.");
                    
                    // İndir butonu ekle
                    showDownloadButton(data.llm_answer);

                    // Ajan modunda tek seferlik veri çekimi daha güvenlidir:
                    userQuery.disabled = true;
                    sendBtn.classList.add('hidden');
                    
                    // Hızlı arama seçeneklerini kapat (Gizle)
                    if (quickSearchArea) {
                        quickSearchArea.classList.add('hidden');
                    }
                } else {
                    // Normal Bot Cevabı
                    addMessage(data.llm_answer);
                }
                chatHistory = data.history;
        
                // Placeholder güncelleme
                if (chatHistory.length > 0) {
                    modelSelect.disabled = true; // Seçimi etkisiz hale getir
                    modelSelect.classList.add('opacity-50', 'cursor-not-allowed'); // Görsel olarak belirt
                    
                    if (selectedModel === "my-agent")
                        // Bu modda placeholder'ı "Yeni arama için sayfayı yenile" yapıyoruz:
                        userQuery.placeholder = "Yeni bir arama için sayfayı yenileyin.";
                    else
                        userQuery.placeholder = "Bu kampanyalarla ilgili başka ne öğrenmek istersiniz?";
                }
                
                document.getElementById('retryContainer').classList.add('hidden');
                if(data.retrieved_campaigns) showCampaignCards(data.retrieved_campaigns);
        
            } catch (error) {
                // Hata durumunda da süreyi ölçelim (Kullanıcı ne kadar bekleyip hata aldı?)
                const endTime = performance.now();
                const durationSec = parseFloat(((endTime - startTime) / 1000).toFixed(2));
                
                trackEvent('exception', { 
                    'wait_time': durationSec, 
                    'status_code': response.status,
                    'description': error.name || data.detail || data.message
                });
                
                // ZAMAN AŞIMI HATASI KONTROLÜ
                if (error.name === 'AbortError') {
                    addMessage("<i class='fas fa-clock mr-2 text-orange-500'></i> Yanıt süresi çok uzadı. Gemma şu an yoğun olabilir, lütfen tekrar deneyin.");
                } else {
                    addMessage("<i class='fas fa-wifi mr-2 text-red-500'></i> Bağlantı hatası! Lütfen internetinizi kontrol edin.");
                }
                
                if (document.getElementById('typingIndicator')) document.getElementById('typingIndicator').remove();
                retryContainer.classList.remove('hidden');
                console.error("Fetch Error:", error);
            } finally {
                sendBtn.disabled = false;
                clearTimeout(timeoutId); // Her durumda temizle
            }
        }

        /**
         * İndir butonu - Kampanya verilerini dosya olarak indir
         */
        function showDownloadButton(textToDownload) {
            const div = document.createElement('div');
            div.className = "flex justify-center my-4";
            
            const downloadBtn = document.createElement('button');
            downloadBtn.type = 'button';
            downloadBtn.className = "bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow-lg flex items-center transition transform hover:scale-105";
            downloadBtn.innerHTML = `<i class="fas fa-download mr-2"></i> Verileri İndir`;
            
            downloadBtn.addEventListener('click', () => {
                trackEvent('share', { 
                    'method': 'download', 
                    'content_type': 'campaign_data'
                });
                
                const element = document.createElement('a');
                const file = new Blob([textToDownload], {type: 'text/plain;charset=utf-8'});
                element.href = URL.createObjectURL(file);
                element.download = `kampanya-verileri-${new Date().getTime()}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                URL.revokeObjectURL(element.href);
            });
            
            div.appendChild(downloadBtn);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        /**
         * Kota aşımı hatasında butonu kilitler ve saniyeyi geri saydırır
         */
        function startRetryCountdown(seconds) {
            const retryBtn = retryContainer.querySelector('button');
            retryContainer.classList.remove('hidden');
            retryBtn.disabled = true;
            retryBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            let timeLeft = seconds;
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    retryBtn.innerHTML = `<i class="fas fa-redo-alt mr-1"></i> Şimdi Tekrar Dene`;
                    retryBtn.disabled = false;
                    retryBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    sendBtn.disabled = false;
                } else {
                    sendBtn.disabled = false;
                    retryBtn.innerHTML = `<i class="fas fa-hourglass-half mr-1"></i> ${timeLeft}s Bekleyin...`;
                    timeLeft--;
                }
            }, 1000);
        }

        // Dinamik olarak oluşturulan linkleri izlemek için global dinleyici
        document.addEventListener('click', function(e) {
            // Tıklanan element bir link mi veya bir linkin içinde mi?
            const targetLink = e.target.closest('a');
            
            if (targetLink && targetLink.href) {
                // Sadece bizim kampanya alanlarımızdaki linkleri izleyelim
                const isChatLink = targetLink.closest('#chatWindow');
                const isCardLink = targetLink.closest('#campaignList');
        
                if (isChatLink || isCardLink) {
                    const location = isChatLink ? 'chat_bubble' : 'campaign_card';
                    
                    // Google Analytics'e gönder
                    trackEvent('campaign_click', {
                        'link_url': targetLink.href,        // Hangi URL'e gidildi?
                        'link_text': targetLink.innerText.substring(0, 40), // Link metni (ilk 40 karakter)
                        'click_location': location         // Chat içinden mi karttan mı?
                    });
                    
                    console.log(`📊 İzleme: ${location} üzerinden linke tıklandı.`);
                }
            }
        });
        // Kahve tıklamasını ölçen özel fonksiyon
        function trackCoffeeClick(location) {
            trackEvent('support_click', {
                'click_location': location // 'fixed_button' veya 'error_bubble'
            });
        }

        // Tüm event'lerde ortak olan parametreleri (model, banka sayısı vb.) tek elden yönetir.
        function trackEvent(eventName, params = {}) {
            const selectedModel = document.getElementById('modelSelect') ? document.getElementById('modelSelect').value : 'unknown';
            
            const defaultParams = {
                'ai_model': selectedModel,
                'logged_in_status': sessionToken ? 'logged_in' : 'guest',
                'bank_count': selectedBanks.length,
                'selected_banks': selectedBanks.join(',')
            };
        
            gtag('event', eventName, { ...defaultParams, ...params });
        }
        
    </script>
</body>
</html>
