<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartCini | Akıllı Kampanya Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .bg-gradient-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        /* Yükleme animasyonu */
        .typing-dots span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px;
            background-color: #4B5563;
            display: inline-block;
            border-radius: 50%;
            margin: 0 1px;
        }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-gradient-custom p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic"><i class="fas fa-magic mr-2"></i>KartCini</h1>
            <span class="text-sm opacity-80 italic">Akıllı Kampanya Rehberiniz v1.07.49</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mx-auto p-4 max-w-4xl">
        <!-- Chat Display Area -->
        <div id="chatWindow" class="chat-container bg-white rounded-lg shadow-xl overflow-y-auto p-4 mb-4 space-y-4">
            <!-- Bot Welcome -->
            <div class="flex items-start">
                <div class="bg-purple-100 text-purple-800 p-3 rounded-lg max-w-[80%] shadow-sm">
                    Hoş geldin! Ben KartCini. Bugün hangi harcaman için en iyi kampanyayı bulmamı istersin? (Örn: Market, Akaryakıt, Giyim...)
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-4 relative">
            <form id="searchForm" class="flex space-x-2">
                <input type="text" id="userQuery" 
                       placeholder="Hangi kampanyayı arıyorsunuz?" 
                       class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner"
                       required autocomplete="off">
                <button type="submit" id="sendBtn" class="bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-full transition duration-300 disabled:bg-gray-400">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <!-- Filters (Optional) -->
            <div class="mt-2 flex space-x-2 text-xs text-gray-500">
                <span>Popüler:</span>
                <button onclick="quickSearch('Market')" class="hover:text-purple-600">Market</button>
                <button onclick="quickSearch('Benzin')" class="hover:text-purple-600">Benzin</button>
                <button onclick="quickSearch('Online')" class="hover:text-purple-600">Online</button>
            </div>

            <!-- Hata ve Tekrar Dene Alanı -->
            <div id="retryContainer" class="hidden mt-2 p-2 bg-red-50 border border-red-200 rounded flex items-center justify-between">
                <span class="text-red-600 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>Bir hata oluştu.</span>
                <button onclick="retryLastSearch()" class="text-red-700 font-bold text-sm underline hover:text-red-800">
                    <i class="fas fa-redo-alt mr-1"></i> Tekrar Dene
                </button>
            </div>
        </div>
        
        <!-- Retrieved Campaigns Source List -->
        <div id="campaignList" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        const API_URL = "https://kartcini-api.onrender.com/search";
        
        let chatHistory = [];
        let lastSentQuery = ""; // Hata durumunda tekrar denemek için

        const chatWindow = document.getElementById('chatWindow');
        const searchForm = document.getElementById('searchForm');
        const userQuery = document.getElementById('userQuery');
        const retryContainer = document.getElementById('retryContainer');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser = false, isTyping = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex items-end justify-end" : "flex items-start";
            
            const content = document.createElement('div');
            // max-w-full ekleyerek tablonun taşmasını önlüyoruz
            content.className = isUser 
                ? "bg-purple-600 text-white p-3 rounded-lg max-w-[90%] shadow-md" 
                : "bg-white text-gray-800 p-3 rounded-lg max-w-full shadow-md border border-gray-200 overflow-x-auto";
        
            if (isTyping) {
                content.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
                div.id = "typingIndicator";
            } else {
                // Tailwind sınıfları içeren HTML burada işlenecek
                content.innerHTML = text; 
            }
            
            div.appendChild(content);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function quickSearch(tag) {
            userQuery.value = tag + " harcaması için ne var?";
            searchForm.dispatchEvent(new Event('submit'));
        }

        // Tekrar Dene Fonksiyonu
        function retryLastSearch() {
            if (lastSentQuery) {
                userQuery.value = lastSentQuery; // Metni kutuya geri koy (opsiyonel)
                retryContainer.classList.add('hidden');
                performSearch(lastSentQuery);
            }
        }

        function showCampaignCards(campaigns) {
            campaignList.innerHTML = "";
            if(campaigns.length > 0) {
                campaignList.classList.remove('hidden');
                campaigns.forEach(c => {
                    const card = `
                        <div class="bg-white p-3 rounded shadow border-l-4 border-purple-500 text-sm">
                            <h4 class="font-bold text-gray-700">${c.summary || 'Kampanya Detayı'}</h4>
                            <a href="${c.url}" target="_blank" class="text-blue-500 text-xs truncate block mt-1 italic">Kampanyaya Git →</a>
                        </div>
                    `;
                    campaignList.insertAdjacentHTML('beforeend', card);
                });
            }
        }
        
        searchForm.onsubmit = async (e) => {
            e.preventDefault();
            const query = userQuery.value.trim();
            if(!query) return;

            retryContainer.classList.add('hidden'); // Yeni aramada hatayı gizle
            lastSentQuery = query; // Soruyu yedekle
            
            addMessage(query, true);
            userQuery.value = "";
            await performSearch(query);
        };

        async function performSearch(query) {
            sendBtn.disabled = true;
            addMessage("", false, true); // Yükleniyor animasyonunu ekle
        
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: query,
                        history: chatHistory 
                    })
                });
        
                // Backend'den gelen JSON verisini al (Hata olsa bile veri gelir)
                const data = await response.json();
        
                // Typing animasyonunu her durumda kaldır
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
        
                if (!response.ok) {
                    // BACKEND HATASI (429, 500, 503 vb.)
                    const errorMsg = data.message || "Sunucu şu an yanıt veremiyor.";
                    const retrySeconds = data.retry_after; // Backend'den gelen saniye
        
                    addMessage(`<i class="fas fa-exclamation-circle mr-2"></i>${errorMsg}`);
                    
                    if (retrySeconds) {
                        startRetryCountdown(Math.ceil(retrySeconds));
                    } else {
                        // Saniye yoksa bile retry butonunu normal göster
                        document.getElementById('retryContainer').classList.remove('hidden');
                    }
                    return; // Fonksiyondan çık
                }
        
                // BAŞARILI YANIT
                addMessage(data.llm_answer);
                chatHistory = data.history;
                
                // Başarılıysa retry butonunu gizle
                document.getElementById('retryContainer').classList.add('hidden');

                // Eğer kampanya geldiyse kartları göster
                if(data.retrieved_campaigns && data.retrieved_campaigns.length > 0) {
                    showCampaignCards(data.retrieved_campaigns);
                }
            } catch (error) {
                // AĞ HATASI (İnternet yok, Sunucu kapalı vb.)
                if (document.getElementById('typingIndicator')) document.getElementById('typingIndicator').remove();
                
                addMessage("Bağlantı hatası! İnternetini kontrol edip tekrar dener misin?");
                document.getElementById('retryContainer').classList.remove('hidden');
                console.error("Network Error:", error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        let countdownInterval = null;

        //Bu fonksiyon, "Tekrar Dene" butonunu süre bitene kadar kilitler:
        function startRetryCountdown(seconds) {
            const retryContainer = document.getElementById('retryContainer');
            const retryBtn = retryContainer.querySelector('button');
            
            retryContainer.classList.remove('hidden');
            retryBtn.disabled = true;
            retryBtn.classList.add('opacity-50', 'cursor-not-allowed');
        
            let timeLeft = seconds;
        
            // Eğer zaten çalışan bir sayaç varsa durdur
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    retryBtn.innerHTML = `<i class="fas fa-redo-alt mr-1"></i> Şimdi Tekrar Dene`;
                    retryBtn.disabled = false;
                    retryBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    sendBtn.disabled = false;
                } else {
                    sendBtn.disabled = true;
                    retryBtn.innerHTML = `<i class="fas fa-hourglass-half mr-1"></i> ${timeLeft}s Bekleyin...`;
                    timeLeft--;
                }
            }, 1000);
        }
    </script>
</body>
</html>
