<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartCini | Akıllı Kampanya Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .bg-gradient-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <!-- Header -->
    <nav class="bg-gradient-custom p-4 shadow-lg text-white">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic"><i class="fas fa-magic mr-2"></i>KartCini</h1>
            <span class="text-sm opacity-80 italic">Akıllı Kampanya Rehberiniz</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mx-auto p-4 max-w-4xl">
        
        <!-- Chat Display Area -->
        <div id="chatWindow" class="chat-container bg-white rounded-lg shadow-xl overflow-y-auto p-4 mb-4 space-y-4">
            <!-- Bot Welcome Message -->
            <div class="flex items-start">
                <div class="bg-purple-100 text-purple-800 p-3 rounded-lg max-w-[80%]">
                    Hoş geldin! Ben KartCini. Bugün hangi harcaman için en iyi kampanyayı bulmamı istersin? (Örn: Market, Akaryakıt, Giyim...)
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white rounded-lg shadow-lg p-4">
            <form id="searchForm" class="flex space-x-2">
                <input type="text" id="userQuery" 
                       placeholder="Hangi kampanyayı arıyorsunuz?" 
                       class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-inner"
                       required>
                <button type="submit" id="sendBtn" class="bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-full transition duration-300">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
            
            <!-- Filters (Optional) -->
            <div class="mt-2 flex space-x-2 text-xs text-gray-500">
                <span>Popüler:</span>
                <button onclick="quickSearch('Market')" class="hover:text-purple-600">Market</button>
                <button onclick="quickSearch('Benzin')" class="hover:text-purple-600">Benzin</button>
                <button onclick="quickSearch('Online')" class="hover:text-purple-600">Online</button>
            </div>
        </div>

        <!-- Retrieved Campaigns Source List -->
        <div id="campaignList" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        const API_URL = "https://kartcini-api.onrender.com/search"; // KENDİ RENDER URL'İNLE DEĞİŞTİR

        const chatWindow = document.getElementById('chatWindow');
        const searchForm = document.getElementById('searchForm');
        const userQuery = document.getElementById('userQuery');
        const campaignList = document.getElementById('campaignList');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex items-end justify-end" : "flex items-start";
            
            const p = document.createElement('p');
            p.className = isUser 
                ? "bg-purple-600 text-white p-3 rounded-lg max-w-[80%] shadow-md" 
                : "bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] shadow-md";
            
            // Linkleri tıklanabilir yap
            p.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="underline font-bold font-blue-600 text-xs block mt-1">$1</a>');
            
            div.appendChild(p);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function quickSearch(tag) {
            userQuery.value = tag + " harcaması için ne var?";
            searchForm.dispatchEvent(new Event('submit'));
        }

        searchForm.onsubmit = async (e) => {
            e.preventDefault();
            const query = userQuery.value.trim();
            if(!query) return;

            // UI hazırlığı
            addMessage(query, true);
            userQuery.value = "";
            sendBtn.disabled = true;
            addMessage("KartCini düşünüyor... ✨");

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();
                
                // Son bot mesajını sil (düşünüyor yazısını)
                chatWindow.lastChild.remove();

                // Gemini yanıtını bas
                addMessage(data.llm_answer);

                // Referans kampanyaları kart olarak göster
                showCampaignCards(data.retrieved_campaigns);

            } catch (error) {
                addMessage("Üzgünüm, bir bağlantı hatası oluştu. Lütfen tekrar dene.");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        };

        function showCampaignCards(campaigns) {
            campaignList.innerHTML = "";
            if(campaigns.length > 0) {
                campaignList.classList.remove('hidden');
                campaigns.forEach(c => {
                    const card = `
                        <div class="bg-white p-3 rounded shadow border-l-4 border-purple-500 text-sm">
                            <h4 class="font-bold text-gray-700">${c.summary || 'Kampanya Detayı'}</h4>
                            <a href="${c.url}" target="_blank" class="text-blue-500 text-xs truncate block mt-1 italic">Kampanyaya Git →</a>
                        </div>
                    `;
                    campaignList.insertAdjacentHTML('beforeend', card);
                });
            }
        }
    </script>
</body>
</html>
